name: deploy

# Run this when any branch is pushed
on:
  push:
    branches:
      - '**'

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      # Install dependencies
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip # Implicitly uses requirements.txt for cache key

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Sphinx documentation
        run: |
          make html
          ls -l
        working-directory: ./

      # Upload the book's HTML as an artifact for all branches
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _build/html
          name: github-pages-${{ github.ref_name }}

      # Deploy to GitHub Pages only from main branch
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v5
        
