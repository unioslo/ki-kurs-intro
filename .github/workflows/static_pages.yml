name: deploy

# Run this when any branch is pushed
on:
  push:
    branches:
      - '**'

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      # Install dependencies
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip # Implicitly uses requirements.txt for cache key

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Sphinx documentation
        run: |
          make html
          ls -l
        working-directory: ./

      # Deploy to GitHub Pages
      # Main branch -> root, other branches -> branches/<branch-name>/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
          destination_dir: ${{ github.ref_name != 'main' && format('branches/{0}', github.ref_name) || '.' }}
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'