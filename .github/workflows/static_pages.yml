name: deploy

# Run this when any branch is pushed
on:
  push:
    branches:
      - '**'

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      # Install dependencies
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip # Implicitly uses requirements.txt for cache key

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Sphinx documentation
        run: |
          make html
          ls -l
        working-directory: ./

      # Upload for GitHub Pages deployment (main branch only)
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _build/html

      # Upload as downloadable artifact for other branches
      - name: Upload branch artifact
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ github.ref_name }}
          path: _build/html

      # Deploy to GitHub Pages only from main branch
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v5
        
